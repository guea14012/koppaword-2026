<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#080810"/>
      <stop offset="100%" stop-color="#0d0d24"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="50%"  stop-color="#0066ff"/>
      <stop offset="100%" stop-color="#8b2fff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Border ring -->
  <rect x="8" y="8" width="496" height="496" rx="76" fill="none"
        stroke="url(#neon)" stroke-width="4" opacity="0.6"/>

  <!-- Inner glow -->
  <rect x="20" y="20" width="472" height="472" rx="66" fill="none"
        stroke="#00d4ff" stroke-width="1" opacity="0.2"/>

  <!-- Corner accents -->
  <path d="M 40 40 L 40 80 M 40 40 L 80 40" stroke="#00d4ff" stroke-width="4" fill="none" opacity="0.8"/>
  <path d="M 472 40 L 472 80 M 472 40 L 432 40" stroke="#00d4ff" stroke-width="4" fill="none" opacity="0.8"/>
  <path d="M 40 472 L 40 432 M 40 472 L 80 472" stroke="#00d4ff" stroke-width="4" fill="none" opacity="0.8"/>
  <path d="M 472 472 L 472 432 M 472 472 L 432 472" stroke="#00d4ff" stroke-width="4" fill="none" opacity="0.8"/>

  <!-- K letterform -->
  <g filter="url(#glow)" transform="translate(256,256)">
    <rect x="-72" y="-140" width="40" height="280" rx="8" fill="url(#neon)"/>
    <path d="M -32 -30 L 90 -140 L 130 -140 L -2 10 Z" fill="url(#neon)" opacity="0.95"/>
    <path d="M -2 -10 L 130 140 L 90 140 L -32 30 Z" fill="url(#neon)" opacity="0.95"/>
  </g>

  <!-- "2026" subtitle -->
  <text x="256" y="430" text-anchor="middle"
        font-family="monospace" font-size="28" font-weight="700"
        letter-spacing="10" fill="#00d4ff" opacity="0.7">2026</text>

  <!-- Decorative lines -->
  <line x1="60"  y1="450" x2="200" y2="450" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="312" y1="450" x2="452" y2="450" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
</svg>
